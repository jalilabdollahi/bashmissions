title: Replace in String
difficulty: beginner
xp: 70
objective: Take `$1` and print it with **every** space replaced by a `-` using `${text// /-}`. Single-slash form (`${var/old/new}`) only replaces the first occurrence.
expected_script_name: solution.sh
test_cases:
- args:
  - hello world
  expected_stdout: hello-world
  expected_exit: 0
  comparison: exact
- args:
  - a b c d
  expected_stdout: a-b-c-d
  expected_exit: 0
  comparison: exact
- args:
  - nospaces
  expected_stdout: nospaces
  expected_exit: 0
  comparison: exact
fixtures:
- data.txt
concepts:
- '`${var//old/new}`'
- string replacement
scaffold: true
