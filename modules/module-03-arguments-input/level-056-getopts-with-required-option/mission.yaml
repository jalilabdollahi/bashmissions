id: 56
module: 3
module_name: arguments-input
module_display: Arguments & Input
title: Getopts with Required Option
difficulty: beginner
xp: 60
objective: Use `getopts` to require `-f VALUE`. If `-f` is missing or has no value,
  print nothing and exit with status 1. If present, print `file=<value>`.
expected_script_name: solution.sh
test_cases:
- args:
  - -f
  - config.yml
  expected_stdout: file=config.yml
  expected_exit: 0
  comparison: exact
- args:
  - -f
  - two words.txt
  expected_stdout: file=two words.txt
  expected_exit: 0
  comparison: exact
- args: []
  expected_stdout: ''
  expected_exit: 1
  comparison: exact
- args:
  - -f
  expected_stdout: ''
  expected_exit: 1
  comparison: exact
fixtures:
- data.txt
concepts:
- error on missing optarg
scaffold: true
